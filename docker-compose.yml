version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: taskboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: taskboard_password
      POSTGRES_DB: taskboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - taskboard-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskboard-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=taskboard;Username=postgres;Password=taskboard_password;Port=5432"
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - taskboard-network

  frontend:
    image: php:8.1-apache
    container_name: taskboard-frontend
    ports:
      - "8000:80"
    volumes:
      - ./frontend/public:/var/www/html
      - ./frontend/src:/var/www/html/src
      - ./frontend/api:/var/www/html/api
    depends_on:
      - api
    networks:
      - taskboard-network

volumes:
  postgres_data:

networks:
  taskboard-network:
    driver: bridge
